name: Autonomous Writer

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip schedule check and write immediately'
        type: boolean
        default: true

concurrency:
  group: autonomous-writer
  cancel-in-progress: false  # Queue, never discard a completed post

jobs:
  write:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3  # TODO: no Node 24 version yet, will be force-migrated June 2026
        with:
          hugo-version: '0.148.2'

      - name: Install dependencies
        run: uv sync

      - name: Run agent
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ENABLE_RESEARCH: 'true'
          ENABLE_IMAGES: 'true'
          ENABLE_BLUESKY: 'true'
          BLUESKY_HANDLE: 'autonomouswriter.bsky.social'
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          FORCE_POST: ${{ inputs.force }}
        run: uv run python -m agent.main

      - name: Commit new content
        id: commit
        run: |
          git config user.name "autonomous-writer[bot]"
          git config user.email "autonomous-writer[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add site/content/posts/ system/memory.json system/prompts/
            git commit -m "post: $(date -u +%Y-%m-%d) [autonomous]"
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new content. Scheduled post pending."
          fi

      - name: Deploy to Azure Static Web Apps
        if: steps.commit.outputs.has_changes == 'true'
        uses: Azure/static-web-apps-deploy@v1
        env:
          HUGO_VERSION: 0.148.2
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_WATER_001FE8510 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/site"
          api_location: ""
          output_location: "public"
          skip_app_build: false
